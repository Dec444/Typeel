name: release

# Build installers for macOS (Apple Silicon + Intel), Windows, and Linux in the
# cloud — no local toolchain or Xcode required. Push a version tag to trigger,
# e.g.  git tag v0.1.0 && git push origin v0.1.0
# You can also run it manually from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'    # Apple Silicon (M1 and newer)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'    # Intel Macs
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'    # Linux x64
            args: ''
          - platform: 'windows-latest'  # Windows x64
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Only needed on the macOS runners (so the Windows/Linux jobs skip it).
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Typeel ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

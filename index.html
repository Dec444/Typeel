<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typeel</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="side-head">
          <div class="brand">
            <span class="logo"><svg class="logo-mark" viewBox="0 0 96 96" width="22" height="22" aria-hidden="true"><path d="M64 24 A30 30 0 1 0 64 72" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round"/><path d="M58 34 A18 18 0 1 0 58 62" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round"/><rect x="43" y="38" width="6" height="20" rx="3" style="fill:var(--accent)"/></svg>Typeel</span>
            <span class="tagline">Peel your thoughts.</span>
          </div>
          <button id="sidebar-toggle" class="icon-btn" title="Hide sidebar">&#10094;</button>
        </div>
        <div class="side-pinned">
          <button id="welcome-row" class="pinned-item">Welcome</button>
          <button id="return-row" class="pinned-item hidden"></button>
        </div>
        <div class="outline-head">Outline</div>
        <div id="outline" class="outline">
          <p class="empty-hint">Headings in this document will appear here.</p>
        </div>
      </aside>

      <main id="main">
        <header id="toolbar">
          <button id="sidebar-show" class="tbtn" title="Show sidebar">&#10095;</button>
          <span id="doc-title">Untitled</span>
          <span id="dirty-dot" class="dirty-dot hidden" title="Unsaved changes">&#9679;</span>
          <div class="spacer"></div>
          <button id="new-file" class="tbtn">New</button>
          <button id="open-file" class="tbtn">Open</button>
          <button id="save-file" class="tbtn">Save</button>
          <div class="menu-wrap">
            <button id="export-btn" class="tbtn" title="Export">Export</button>
            <div id="export-menu" class="drop-menu hidden">
              <button class="drop-item" data-fmt="pdf">PDF&hellip;</button>
              <button class="drop-item" data-fmt="html">HTML file</button>
            </div>
          </div>
          <div class="menu-wrap">
            <button id="font-btn" class="tbtn" title="Editor font">Font</button>
            <div id="font-menu" class="drop-menu hidden">
              <button class="drop-item" data-font="source">Source Sans 3</button>
              <button class="drop-item" data-font="sulphur">Sulphur Point</button>
              <button class="drop-item" data-font="ysabeau">Ysabeau Infant</button>
            </div>
          </div>
          <div class="theme-wrap">
            <button id="theme-btn" class="tbtn" title="Choose theme">Theme</button>
            <div id="theme-menu" class="theme-menu hidden">
              <button class="theme-opt" data-name="bw">
                <span class="sw"><i style="background:#ffffff"></i><i style="background:#0f0f10"></i><i style="background:#8a8a8e"></i></span>
                <span class="to-text"><b>Black &amp; White</b><small>White / Black · neutral grey</small></span>
              </button>
              <button class="theme-opt" data-name="b">
                <span class="sw"><i style="background:#f3e6d3"></i><i style="background:#5e647c"></i><i style="background:#5e647c"></i></span>
                <span class="to-text"><b>Cream &amp; Slate</b><small>Creamy · Slate Blue</small></span>
              </button>
              <button class="theme-opt" data-name="c">
                <span class="sw"><i style="background:#f8f4e3"></i><i style="background:#d8a7b1"></i><i style="background:#845a66"></i></span>
                <span class="to-text"><b>Ivory &amp; Rose</b><small>Ivory · Dusty Rose</small></span>
              </button>
            </div>
          </div>
          <button id="toggle-theme" class="tbtn" title="Toggle light / dark">&#9680;</button>
        </header>
        <div id="editor" class="crepe"></div>
        <footer id="statusbar">
          <span id="blocktype" class="statinfo"></span>
          <button id="wordcount" class="statbtn" title="Toggle word count"></button>
        </footer>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
